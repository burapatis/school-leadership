- category: leadership
  category_name: ภาวะผู้นำ
  title: ครูแตกเป็นสองฝ่ายเรื่องนโยบายใหม่
  summary: โรงเรียนประกาศใช้แนวทางประเมินเพื่อพัฒนาแทนการสอบเก็บคะแนนถี่ ๆ ครูกลุ่มหนึ่งสนับสนุน อีกกลุ่มต่อต้านและเริ่มสื่อสารเชิงลบในห้องพักครู
  prompt: ผู้นำจะรักษาทิศทางการเปลี่ยนแปลงโดยไม่ทำลายความสัมพันธ์ในองค์กรได้อย่างไร ควรฟังอะไร ยืนยันอะไร และปรับอะไร

- category: leadership
  category_name: ภาวะผู้นำ
  title: รับตำแหน่งใหม่ในโรงเรียนที่ขวัญกำลังใจตกต่ำ
  summary: ผู้บริหารคนก่อนย้ายออกท่ามกลางความขัดแย้ง ครูเก่งหลายคนขอย้ายตาม ผลการเรียนของนักเรียนลดลงต่อเนื่อง 3 ปี
  prompt: 90 วันแรกควรให้น้ำหนักกับการฟังและสร้างความไว้วางใจ หรือเร่งสร้างผลลัพธ์ระยะสั้น อะไรคือสัญญาณที่ต้องจัดการทันที

- category: academic
  category_name: วิชาการ
  title: ผลการอ่านของนักเรียนต่ำกว่าเกณฑ์อย่างมีนัยสำคัญ
  summary: ผลประเมินระดับชาติชี้ว่านักเรียนชั้นประถมต้นจำนวนมากอ่านไม่คล่อง ครูแต่ละคนสอนอ่านด้วยวิธีที่ต่างกันตามความถนัด
  prompt: ผู้บริหารควรนำการเปลี่ยนแปลงทางวิชาการอย่างไรให้เกิดแนวปฏิบัติร่วม โดยไม่ลดทอนความเป็นมืออาชีพของครู

- category: academic
  category_name: วิชาการ
  title: แรงกดดันให้เน้นติวสอบมากกว่าการเรียนรู้
  summary: ผู้ปกครองและต้นสังกัดคาดหวังคะแนนสอบสูง ครูเริ่มตัดกิจกรรมการเรียนรู้เชิงลึกเพื่อติวข้อสอบ นักเรียนเครียดสะสม
  prompt: จะสร้างสมดุลระหว่างความรับผิดชอบต่อผลสัมฤทธิ์กับการเรียนรู้ที่มีความหมายอย่างไร และจะสื่อสารกับผู้มีส่วนได้ส่วนเสียอย่างไร

- category: people
  category_name: บุคลากร
  title: ครูมีศักยภาพสูงแต่หมดไฟ
  summary: ครูแกนนำที่เคยขับเคลื่อนงานวิชาการเริ่มถอนตัวจากทุกภารกิจ ขอทำเฉพาะงานสอนขั้นต่ำ หลังรับภาระงานพิเศษจำนวนมากติดต่อกันหลายปี
  prompt: อะไรคือสัญญาณเชิงระบบที่ผู้บริหารควรแก้ (ภาระงาน การกระจายงาน การยอมรับคุณค่า) มากกว่าการแก้ที่ตัวบุคคล

- category: people
  category_name: บุคลากร
  title: ความขัดแย้งระหว่างครูรุ่นใหม่กับครูอาวุโส
  summary: ครูรุ่นใหม่เสนอวิธีสอนและเครื่องมือดิจิทัลใหม่ ๆ ครูอาวุโสมองว่าไม่เคารพประสบการณ์ ความตึงเครียดเริ่มกระทบงานระดับสายชั้น
  prompt: ผู้บริหารจะเปลี่ยนความต่างระหว่างรุ่นให้เป็นพลังเสริมกันได้อย่างไร โครงสร้างการทำงานแบบใดช่วยให้ทั้งสองฝ่ายเรียนรู้จากกัน

- category: community
  category_name: ชุมชน
  title: ข่าวลือเชิงลบเกี่ยวกับโรงเรียนแพร่ในโซเชียลมีเดีย
  summary: โพสต์กล่าวหาโรงเรียนเรื่องการใช้เงินบำรุงการศึกษาแพร่กระจายเร็ว ข้อมูลบางส่วนคลาดเคลื่อน ผู้ปกครองเริ่มโทรสอบถามจำนวนมาก
  prompt: หลักการสื่อสารในภาวะวิกฤตคืออะไร ควรเปิดเผยข้อมูลอะไร เมื่อใด และใช้ช่องทางใด เพื่อรักษาความเชื่อมั่นด้วยข้อเท็จจริง

- category: community
  category_name: ชุมชน
  title: ชุมชนต้องการใช้พื้นที่โรงเรียนจัดงานที่อาจกระทบการเรียน
  summary: ผู้นำชุมชนขอใช้สนามโรงเรียนจัดงานประจำปีหลายวันในช่วงเปิดภาคเรียน ซึ่งกระทบการเรียนการสอนและความปลอดภัย แต่โรงเรียนก็พึ่งพาแรงสนับสนุนจากชุมชนสูง
  prompt: จะรักษาความสัมพันธ์เชิงบวกกับชุมชนโดยยังคุ้มครองสิทธิการเรียนรู้และความปลอดภัยของนักเรียนได้อย่างไร

- category: ethics
  category_name: จริยธรรม
  title: ถูกขอให้ปรับตัวเลขรายงานให้ “ดูดี”
  summary: ก่อนการประเมินภายนอก มีข้อเสนอแนะกึ่งกดดันให้ปรับข้อมูลบางรายการในรายงานประเมินตนเองให้สวยกว่าความเป็นจริง
  prompt: ต้นทุนระยะยาวของข้อมูลที่ไม่ตรงความจริงคืออะไร ผู้บริหารจะยืนยันความถูกต้องอย่างมีศิลปะและปกป้องทีมงานได้อย่างไร

- category: ethics
  category_name: จริยธรรม
  title: การรับของขวัญจากผู้รับเหมาก่อนการจัดซื้อจัดจ้าง
  summary: ผู้รับเหมาที่เคยทำงานให้โรงเรียนส่งกระเช้าของขวัญมูลค่าสูงให้ผู้บริหารก่อนถึงรอบการจัดซื้อจัดจ้างประจำปี
  prompt: เส้นแบ่งระหว่างน้ำใจตามวัฒนธรรมกับผลประโยชน์ทับซ้อนอยู่ตรงไหน ระเบียบและแนวปฏิบัติที่เกี่ยวข้องกำหนดอย่างไร
