baseURL = 'https://admin.thamdee.com/'
locale = 'th-th'
title = 'ศูนย์วิชาชีพผู้บริหารสถานศึกษาไทย'
defaultContentLanguage = 'th'
disableKinds = ['taxonomy', 'term']
enableRobotsTXT = true
canonifyURLs = true
pygmentsUseClasses = true

[params]
  description = 'ศูนย์รวมหลักการ มาตรฐาน จรรยาบรรณ และการพัฒนาวิชาชีพผู้บริหารสถานศึกษาไทยบนหลักการสากล'
  author = 'ศูนย์วิชาชีพผู้บริหารสถานศึกษาไทย'
  license = 'CC BY-SA 4.0'
  og_image = 'images/og-default.svg'

[outputs]
  home = ['HTML', 'RSS']
  section = ['HTML']
  page = ['HTML']

[sitemap]
  changefreq = 'monthly'
  priority = 0.5
  filename = 'sitemap.xml'

[markup]
